site_name: Atomic Docs
site_url: https://beatomic.club/
site_description: How to set up and configure Atomic, the short and focused guide.
site_author: Atomic
copyright: Atomic. For educational purposes only.

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Features:
      - Combat: features/combat.md
      - Hit Locations: features/hit-locations.md
      - Character: features/character.md
      - Visuals: features/visuals.md
      - Everything Else: features/other.md
  - Troubleshooting: troubleshooting.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/beatomicc
      name: Atomic Discord
    - icon: fontawesome/solid/globe
      link: https://weao.xyz/
      name: Find an executor (WEAO)
